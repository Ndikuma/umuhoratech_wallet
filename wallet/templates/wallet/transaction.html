{% extends 'wallet/base.html' %}


{% block title %}Send Bitcoin{% endblock %}

{% block content %}
<div class="max-w-md mx-auto">
    <div class="bg-white shadow-md rounded-lg overflow-hidden">
        <div class="bg-green-600 px-4 py-5 sm:px-6">
            <h3 class="text-lg leading-6 font-medium text-white">Send Bitcoin</h3>
        </div>
        <div class="px-4 py-5 sm:p-6">
            <p class="text-sm text-gray-500 mb-4">Available Balance: <span class="font-bold">{{ wallet.balance }} BTC</span></p>
            
            <form method="post">
                {% csrf_token %}
                <div class="space-y-4">
                    {{ form.address }}
                    {{ form.amount }}
                </div>
                
                <div class="mt-6">
                    <button type="submit" class="w-full flex justify-center py-2 px-4 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-blue-600 hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500">
                        Send Bitcoin
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
